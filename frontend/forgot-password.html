<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – PollSphere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="12" fill="url(#lg1)"/>
                        <path d="M19 28 L19 12 L27 12 L27 28 Z" fill="white"/>
                        <path d="M10 28 L10 18 L18 18 L18 28 Z" fill="white" opacity="0.9"/>
                        <path d="M28 28 L28 20 L36 20 L36 28 Z" fill="white" opacity="0.7"/>
                        <defs>
                            <linearGradient id="lg1" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#6366f1"/>
                                <stop offset="100%" stop-color="#8b5cf6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="brand-name">Forgot Password</h1>
                <p class="brand-tagline">Enter your email to receive a reset link</p>
            </div>

            <div class="auth-panel">
                <form id="forgot-password-form" novalidate>
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
                            </span>
                            <input type="email" id="email" class="form-input" placeholder="you@company.com" required />
                        </div>
                    </div>
                    
                    <div id="status-error" class="form-error hidden"></div>
                    <div id="status-success" class="form-success hidden"></div>

                    <button type="submit" id="submit-btn" class="btn btn-primary btn-full">
                        <span class="btn-text">Send Reset Link</span>
                        <span class="btn-spinner hidden"></span>
                    </button>

                    <div class="form-footer" style="justify-content: center; margin-top: 24px;">
                        <a href="index.html" class="auth-link">Back to Login</a>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/forgot-password.js"></script>
</body>

</html>
