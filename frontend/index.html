<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PollSphere – Secure Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/auth.css" />
</head>

<body class="auth-page">

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="auth-container">
        <div class="auth-card glass">

            <div class="auth-header">
                <div class="brand-logo">
                    <svg width="48" height="48" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="10" fill="var(--clr-primary)" />
                        <path d="M12 28V18H18V28H12ZM20 28V12H26V28H20ZM28 28V22H34V28H28Z" fill="white" />
                    </svg>
                </div>
                <h1 class="gradient-text">PollSphere</h1>
                <p class="auth-subtitle">Internal Intelligence & Feedback</p>
            </div>

            <div class="auth-tabs glass" role="tablist">
                <button class="auth-tab active" id="tab-login">Sign In</button>
                <button class="auth-tab" id="tab-register-user">Join Org</button>
                <button class="auth-tab" id="tab-register-admin">Setup Admin</button>
            </div>

            <!-- Login Section -->
            <div class="auth-panel" id="panel-login">
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Work Email</label>
                        <input type="email" id="login-email" class="form-input" placeholder="name@company.com" required>
                    </div>
                    <div class="form-group">
                        <div class="label-row">
                            <label class="form-label">Password</label>
                            <a href="forgot-password.html" class="small-link">Forgot?</a>
                        </div>
                        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <div id="login-error" class="form-error hidden"></div>
                    <button type="submit" id="login-btn" class="btn btn-primary btn-full">
                        <span class="btn-text">Access Dashboard</span>
                        <div class="btn-spinner hidden"></div>
                    </button>
                </form>
            </div>

            <!-- User Register Section -->
            <div class="auth-panel hidden" id="panel-register-user">
                <form id="register-user-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="user-name" class="form-input" placeholder="Employee Name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Work Email</label>
                        <input type="email" id="user-email" class="form-input" placeholder="name@company.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="user-password" class="form-input" placeholder="Min. 6 characters"
                            required>
                    </div>
                    <div id="register-user-error" class="form-error hidden"></div>
                    <div id="register-user-success" class="form-success hidden"></div>
                    <button type="submit" id="register-user-btn" class="btn btn-primary btn-full">
                        <span class="btn-text">Join Workspace</span>
                        <div class="btn-spinner hidden"></div>
                    </button>
                </form>
            </div>

            <!-- Admin Register Section -->
            <div class="auth-panel hidden" id="panel-register-admin">
                <form id="register-admin-form">
                    <div class="form-group">
                        <label class="form-label">Admin Name</label>
                        <input type="text" id="admin-name" class="form-input" placeholder="System Administrator"
                            required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Admin Email</label>
                        <input type="email" id="admin-email" class="form-input" placeholder="admin@company.com"
                            required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Setup Password</label>
                        <input type="password" id="admin-password" class="form-input" placeholder="Secure Password"
                            required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">System Access Code</label>
                        <input type="password" id="admin-code" class="form-input" placeholder="Contact IT for code"
                            required>
                    </div>
                    <div id="register-admin-error" class="form-error hidden"></div>
                    <div id="register-admin-success" class="form-success hidden"></div>
                    <button type="submit" id="register-admin-btn" class="btn btn-primary btn-full">
                        <span class="btn-text">Setup Admin Profile</span>
                        <div class="btn-spinner hidden"></div>
                    </button>
                </form>
            </div>

        </div>
        <p class="auth-footer-text">@PollSphere 2026</p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <div class="toast-container" id="toast-container"></div>
</body>
</html>
